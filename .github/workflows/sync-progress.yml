name: Sync Notion Progress

# 매일 KST 09:00 + 15:00 = UTC 00:00 + 06:00
# (cron은 UTC 기준)
on:
  schedule:
    - cron: '0 0 * * *'   # KST 09:00
    - cron: '0 6 * * *'   # KST 15:00
  workflow_dispatch:       # 수동 실행 버튼 (GitHub Actions 페이지에서)

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # commit + push 권한
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Notion sync
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: node sync-progress.mjs

      - name: Commit & push if changed
        run: |
          if git diff --quiet index.html; then
            echo "No changes — skipping commit"
          else
            git config user.name "SKAI Automation"
            git config user.email "automation@skai.ai"
            git add index.html
            git commit -m "Update progress tracker - $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')"
            git push
            echo "Pushed updated progress"
          fi
